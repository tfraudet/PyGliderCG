services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pyglidercg-app
    image: tfraudet/pyglidercg:latest
    ports:
      - '8000:8000'
    environment:
      - APP_DEBUG_MODE=${APP_DEBUG_MODE:-false}
      - DB_NAME=${DB_NAME:?error}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8000}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
      - ./web:/app/web
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health && curl -f http://localhost:8000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s