version: '3.8'

services:
  # FastAPI Backend Service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pyglider-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-false}
      - DB_NAME=/app/data/gliders.db
      - DB_PATH=/app/data
      - HOST=0.0.0.0
      - PORT=8000
      - COOKIE_KEY=${COOKIE_KEY:-your-secret-key-change-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
    networks:
      - pyglider-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - db-init

  # Streamlit Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pyglider-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_CLIENT_TOOLBAR_MODE=minimal
      - DEBUG=${DEBUG:-false}
      - DB_NAME=/app/data/gliders.db
      - DB_PATH=/app/data
      - BACKEND_URL=http://backend:8000
      - COOKIE_KEY=${COOKIE_KEY:-your-secret-key-change-in-production}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./pages:/app/pages
      - ./streamlit_app.py:/app/streamlit_app.py
    networks:
      - pyglider-network
    depends_on:
      - backend
      - db-init
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8501/_stcore/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Database initialization service
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pyglider-db-init
    command: python init_db.py
    environment:
      - DEBUG=${DEBUG:-false}
      - DB_NAME=/app/data/gliders.db
      - DB_PATH=/app/data
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    networks:
      - pyglider-network
    profiles: ['init']

networks:
  pyglider-network:
    driver: bridge
