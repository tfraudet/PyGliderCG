services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pyglider-app
    ports:
      - '8000:8000'
      - '8501:8501'
    environment:
      - DEBUG=${DEBUG:-false}
      - DB_NAME=gliders.db
      - DB_PATH=/app/data
      - HOST=0.0.0.0
      - PORT=8000
      - BACKEND_URL=http://127.0.0.1:8000
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_CLIENT_TOOLBAR_MODE=minimal
      - COOKIE_KEY=${COOKIE_KEY:-your-secret-key-change-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./data:/app/data
      - ./frontend:/app/frontend
      - ./backend:/app/backend
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health && curl -f http://localhost:8501/_stcore/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
