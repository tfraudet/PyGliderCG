name: Backend Tests and Linting

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'requirements.txt'
      - 'requirements-backend.txt'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'requirements.txt'
      - 'requirements-backend.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-backend.txt
        pip install pytest pytest-cov pytest-asyncio httpx

    - name: Lint with pylint
      run: |
        pip install pylint
        pylint backend/ --exit-zero --disable=all --enable=E,F || true
      continue-on-error: true

    - name: Check syntax with Python
      run: |
        python -m py_compile backend/main.py
        python -m py_compile backend/config.py
        for file in backend/**/*.py; do python -m py_compile "$file" || exit 1; done

    - name: Run pytest
      run: |
        pytest tests/ -v --tb=short || true
      continue-on-error: true

    - name: Security check with bandit
      run: |
        pip install bandit
        bandit -r backend/ --skip B101 || true
      continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build unified app Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: pyglider-app:latest
