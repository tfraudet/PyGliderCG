# Production Docker Compose configuration
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pyglidercg-app
    image: tfraudet/pyglidercg:latest
    restart: always
    ports:
      - '8000:8000'
    environment:
      - APP_DEBUG_MODE=false
      - DB_NAME=/app/data/gliders.db
      - HOST=0.0.0.0
      - PORT=8000
      - BACKEND_URL=http://127.0.0.1:8000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?error}
      - LOG_LEVEL=WARNING
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - /var/lib/pyglider/data:/app/data
      - /var/lib/pyglider/logs:/app/logs
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health']
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '3'

